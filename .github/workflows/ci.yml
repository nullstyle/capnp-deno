# .github/workflows/ci.yml
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Fast checks: fmt, lint, type-check, unit tests, codegen tests ──
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.3.1 # actions/checkout v4
        with:
          submodules: recursive

      - uses: jdx/mise-action@v3.6.1 # jdx/mise-action v3
        with:
          install: true
          cache: true
          github_token: ${{ github.token }}

      - name: Install Cap'n Proto compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          if command -v capnp >/dev/null 2>&1; then
            echo "capnp already installed: $(capnp --version)"
            exit 0
          fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y capnproto libcapnp-dev
          else
            apt-get update
            apt-get install -y capnproto libcapnp-dev
          fi

      - name: Format, lint, type-check, unit tests
        run: deno task verify

      - name: Codegen tests
        run: deno task test:codegen

      - name: Generate coverage report
        run: |
          deno task test:coverage
          deno coverage coverage/ --lcov > coverage/lcov.info

      - name: Upload coverage report
        if: env.ACT != 'true'
        uses: actions/upload-artifact@v4.6.2 # actions/upload-artifact v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ── Socket integration tests ───────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify
    steps:
      - uses: actions/checkout@v4.3.1 # actions/checkout v4

      - uses: jdx/mise-action@v3.6.1 # jdx/mise-action v3
        with:
          install: true
          cache: true
          github_token: ${{ github.token }}

      - name: Install Cap'n Proto compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          if command -v capnp >/dev/null 2>&1; then
            echo "capnp already installed: $(capnp --version)"
            exit 0
          fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y capnproto libcapnp-dev
          else
            apt-get update
            apt-get install -y capnproto libcapnp-dev
          fi

      - name: Socket integration tests
        run: deno task test:integration

  # ── Real WASM: build wasm from capnp-zig, run real-wasm tests ─────
  real-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    needs: verify
    steps:
      - uses: actions/checkout@v4.3.1 # actions/checkout v4
        with:
          submodules: recursive

      - uses: jdx/mise-action@v3.6.1 # jdx/mise-action v3
        with:
          install: true
          cache: true
          github_token: ${{ github.token }}

      - name: Install Cap'n Proto compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          if command -v capnp >/dev/null 2>&1; then
            echo "capnp already installed: $(capnp --version)"
            exit 0
          fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y capnproto libcapnp-dev
          else
            apt-get update
            apt-get install -y capnproto libcapnp-dev
          fi

      - name: Cache zig build artifacts
        uses: actions/cache@v4.3.0 # actions/cache v4
        with:
          path: |
            vendor/capnp-zig/.zig-cache
            vendor/capnp-zig/zig-out
            ~/.cache/zig
          key: zig-cache-${{ runner.os }}-${{ hashFiles('vendor/capnp-zig/**/*.zig', 'vendor/capnp-zig/build.zig.zon') }}
          restore-keys: |
            zig-cache-${{ runner.os }}-

      - name: Build WASM
        run: CAPNPC_ZIG_ROOT=vendor/capnp-zig deno task build:wasm

      - name: Smoke test
        run: deno task smoke:real

      - name: Real WASM tests
        run: deno task test:real

  # ── Performance benchmarks ────────────────────────────────────────
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: verify
    if: always() && needs.verify.result == 'success'
    steps:
      - uses: actions/checkout@v4.3.1 # actions/checkout v4

      - uses: jdx/mise-action@v3.6.1 # jdx/mise-action v3
        with:
          install: true
          cache: true
          github_token: ${{ github.token }}

      - name: Install Cap'n Proto compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          if command -v capnp >/dev/null 2>&1; then
            echo "capnp already installed: $(capnp --version)"
            exit 0
          fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y capnproto libcapnp-dev
          else
            apt-get update
            apt-get install -y capnproto libcapnp-dev
          fi

      - name: Restore previous benchmark results
        uses: actions/cache/restore@v4.3.0 # actions/cache v4
        with:
          path: bench/results.json
          key: bench-results-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            bench-results-${{ github.ref_name }}-
            bench-results-main-

      - name: Stash previous results
        run: |
          if [ -f bench/results.json ]; then
            mkdir -p bench/previous
            mv bench/results.json bench/previous/results.json
            echo "Restored previous benchmark results."
          else
            echo "No previous benchmark results found."
          fi

      - name: Run Deno benchmarks
        run: deno task bench:fast

      - name: Run benchmark regression tests
        run: deno test --no-check --allow-env=CI --allow-write=bench/results.json --allow-run=git bench/regression_test.ts

      - name: Upload benchmark results artifact
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@v4.6.2 # actions/upload-artifact v4
        with:
          name: bench-results
          path: bench/results.json
          if-no-files-found: ignore
          retention-days: 90

      - name: Save benchmark results to cache
        if: always() && hashFiles('bench/results.json') != ''
        uses: actions/cache/save@v4.3.0 # actions/cache v4
        with:
          path: bench/results.json
          key: bench-results-${{ github.ref_name }}-${{ github.sha }}

      - name: Compare against previous results
        if: always()
        run: |
          if [ ! -f bench/previous/results.json ] || [ ! -f bench/results.json ]; then
            echo "No previous or current results to compare, skipping."
            exit 0
          fi
          deno eval '
            const prev = JSON.parse(Deno.readTextFileSync("bench/previous/results.json"));
            const curr = JSON.parse(Deno.readTextFileSync("bench/results.json"));
            console.log(`Comparing: ${prev.commit?.slice(0,8) ?? "unknown"} -> ${curr.commit?.slice(0,8) ?? "unknown"}`);
            console.log("---");
            const prevMap = new Map(prev.results.map((r: {name: string, opsPerSec: number}) => [r.name, r.opsPerSec]));
            let regressions = 0;
            for (const r of curr.results) {
              const prevOps = prevMap.get(r.name);
              if (prevOps == null) {
                console.log(`  ${r.name}: NEW (${r.opsPerSec.toFixed(0)} ops/s)`);
                continue;
              }
              const ratio = r.opsPerSec / prevOps;
              const pct = ((ratio - 1) * 100).toFixed(1);
              const arrow = ratio >= 1 ? "+" : "";
              console.log(`  ${r.name}: ${prevOps.toFixed(0)} -> ${r.opsPerSec.toFixed(0)} ops/s (${arrow}${pct}%)`);
              if (ratio < 0.5) {
                console.log(`::warning::Benchmark "${r.name}" regressed by >50%: ${prevOps.toFixed(0)} -> ${r.opsPerSec.toFixed(0)} ops/s (${arrow}${pct}%)`);
                regressions++;
              }
            }
            if (regressions > 0) {
              console.log(`\n${regressions} benchmark(s) regressed by >50%.`);
              Deno.exit(1);
            } else {
              console.log("\nNo significant regressions detected.");
            }
          '
